async function apiGet(entity, params="") {
  try {
    const r = await fetch(`${BASE44_API}/${entity}/?${params}`, {
      headers: { "Content-Type": "application/json" }
    });
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

async function apiPost(entity, data) {
  const r = await fetch(`${BASE44_API}/${entity}/`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  return r.ok;
}

async function loadAllData() {
  const [content, messages, attractions, rota] = await Promise.all([
    apiGet("LandingPageContent", "order_by=order_index"),
    apiGet("StaffMessage"),
    apiGet("Attraction"),
    apiGet("StaffRota"),
  ]);
  const map = {};
  (content||[]).forEach(r => { map[r.section_type] = r; });
  appData = { content: map, messages: messages||[], attractions: attractions||[], rota: rota||[] };
}

function getContent(key, fallback="") {
  return appData.content[key]?.content || fallback;

function getJSON(key, fallback=null) {

function setupCheckoutInput() {

}

function clearCheckout() {
  checkoutDate = "";

  renderTab("home");
}

function startCountdown() {
  if (!checkoutDate) return;
  function calc() {
    const el = document.getElementById("countdownDisplay");
    if (!el) return;
    const co = new Date(checkoutDate + "T11:00:00");
    const diff = co - new Date();
    if (diff <= 0) { el.textContent = "ג° ׳”׳’׳™׳¢ ׳”׳–׳׳!"; return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    el.textContent = h > 48 ? Math.floor(h/24) + " ׳™׳׳™׳" : h + "׳©׳³ " + m + "׳“׳³";
  }
  calc();
  setInterval(calc, 60000);
}

}
